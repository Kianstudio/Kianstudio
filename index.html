<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#fff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ki & An">
<title>Ki & An</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ===== RESET ===== */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans SC',sans-serif}

/* ===== THEMES ===== */
:root{
  --g1:#fde8f0;--g2:#fce4d6;
  --accent:#e8779a;--accent2:#f4a94e;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --white:rgba(255,255,255,0.85);
  --white2:rgba(255,255,255,0.6);
  --border:rgba(255,255,255,0.5);
}
[data-theme="ocean"]{--g1:#a8edea;--g2:#fed6e3;--accent:#5bafd4;--accent2:#e87b9a}
[data-theme="sunset"]{--g1:#ffecd2;--g2:#fcb69f;--accent:#e07843;--accent2:#f4c26a}
[data-theme="mint"]{--g1:#d4fc79;--g2:#96e6a1;--accent:#3b8c4b;--accent2:#7ab84a}
[data-theme="lavender"]{--g1:#e0c3fc;--g2:#8ec5fc;--accent:#7c4fb0;--accent2:#5bafd4}
[data-theme="peach"]{--g1:#ffeaa7;--g2:#fd79a8;--accent:#e84393;--accent2:#f9c74f}

/* ===== SPLASH ===== */
#splash{
  position:fixed;inset:0;background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;transition:opacity 0.6s ease;
}
#splash.hide{opacity:0;pointer-events:none}
.splash-firework{width:120px;height:120px;position:relative;animation:splashPop 0.6s cubic-bezier(.34,1.56,.64,1) 0.2s both}
@keyframes splashPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.splash-title{
  font-family:'Noto Serif SC',serif;font-size:28px;font-weight:300;
  color:#1a1a1a;margin-top:20px;letter-spacing:0.1em;
  animation:fadeUp 0.5s ease 0.7s both;
}
.splash-sub{
  font-size:12px;color:#aaa;margin-top:6px;letter-spacing:0.15em;
  animation:fadeUp 0.5s ease 0.9s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== APP WRAPPER ===== */
#app{
  height:100%;display:flex;flex-direction:column;
  background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 100%);
  transition:background 0.5s ease;overflow:hidden;
}

/* ===== SCROLL CONTAINER ===== */
#scroller{
  flex:1;overflow-y:auto;overflow-x:hidden;
  scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch;
}
#scroller::-webkit-scrollbar{display:none}

/* ===== HERO (random note) ===== */
#hero{
  min-height:100svh;scroll-snap-align:start;
  display:flex;flex-direction:column;
  padding:env(safe-area-inset-top,20px) 20px 20px;
  position:relative;
}
.hero-top{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:12px;margin-bottom:20px;
}
.hero-logo{font-family:'Noto Serif SC',serif;font-size:18px;font-weight:300;color:var(--text);letter-spacing:0.08em}
.hero-actions{display:flex;gap:10px;align-items:center}
.btn-theme{
  width:32px;height:32px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.4);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;backdrop-filter:blur(8px);transition:all 0.2s;
}
.btn-theme:hover{transform:scale(1.1)}
.btn-profile{
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,0.5);border:2px solid rgba(255,255,255,0.7);
  cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:14px;backdrop-filter:blur(8px);
}
.btn-profile img{width:100%;height:100%;object-fit:cover}

.hero-note-label{font-size:11px;color:var(--text2);letter-spacing:0.1em;margin-bottom:8px}
.hero-note{
  flex:1;width:100%;border:none;outline:none;
  background:transparent;
  font-family:'Noto Sans SC',sans-serif;font-size:18px;font-weight:300;
  color:var(--text);line-height:1.8;resize:none;
  padding:0;
}
.hero-note::placeholder{color:rgba(0,0,0,0.2)}

.scroll-hint{
  text-align:center;padding:16px 0;
  font-size:11px;color:var(--text2);letter-spacing:0.1em;
  animation:bounce 2s infinite;
}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

/* ===== BOARD SECTION ===== */
#board{
  min-height:100svh;scroll-snap-align:start;
  padding:20px;padding-bottom:40px;
}
.board-title{
  font-family:'Noto Serif SC',serif;font-size:14px;font-weight:300;
  color:var(--text2);letter-spacing:0.12em;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;
}
.streak-badge{
  font-size:11px;background:rgba(255,255,255,0.5);
  border-radius:20px;padding:4px 10px;color:var(--text2);
  backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.5);
}

/* ===== GLASS CARDS ===== */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{
  background:rgba(255,255,255,0.45);
  border:1px solid rgba(255,255,255,0.65);
  border-radius:20px;padding:14px;
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 2px 16px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.8);
  cursor:pointer;transition:all 0.2s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.9),transparent);
}
.card:active{transform:scale(0.96)}
.card.full{grid-column:1/-1}
.card-icon{font-size:20px;margin-bottom:6px;display:block}
.card-label{font-size:11px;color:var(--text2);letter-spacing:0.08em;margin-bottom:4px}
.card-value{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-value.muted{color:var(--text3);font-weight:300}
.card-progress{
  height:3px;background:rgba(0,0,0,0.08);border-radius:2px;margin-top:8px;overflow:hidden;
}
.card-progress-fill{height:100%;border-radius:2px;background:var(--accent);transition:width 0.5s ease}

/* ===== MODAL ===== */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);z-index:100;
  display:none;align-items:flex-end;
  animation:fadeIn 0.2s ease;
}
#modal-overlay.open{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{
  width:100%;max-height:85svh;overflow-y:auto;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:24px 24px 0 0;
  padding:20px 20px calc(env(safe-area-inset-bottom,0px)+20px);
  animation:slideUp 0.35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{
  width:36px;height:4px;border-radius:2px;
  background:rgba(0,0,0,0.15);margin:0 auto 16px;
}
.modal-title{
  font-family:'Noto Serif SC',serif;font-size:17px;font-weight:400;
  color:var(--text);margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.modal::-webkit-scrollbar{display:none}

/* ===== PILLS ===== */
.pill-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.pill{
  border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);
  border-radius:20px;padding:6px 14px;font-size:13px;
  cursor:pointer;color:var(--text2);
  font-family:'Noto Sans SC',sans-serif;
  transition:all 0.15s;user-select:none;
}
.pill.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.pill.on.green{background:#7ab84a;border-color:#7ab84a}
.pill.on.blue{background:#5bafd4;border-color:#5bafd4}

/* ===== INPUTS ===== */
textarea,input[type=text],input[type=date]{
  width:100%;border:1px solid rgba(0,0,0,0.1);
  border-radius:12px;padding:10px 12px;
  font-size:14px;font-family:'Noto Sans SC',sans-serif;
  background:rgba(0,0,0,0.03);color:var(--text);
  outline:none;line-height:1.65;resize:none;
}
textarea:focus,input[type=text]:focus,input[type=date]:focus{
  border-color:var(--accent);background:rgba(255,255,255,0.8);
}
.input-label{font-size:11px;color:var(--text2);letter-spacing:0.08em;margin-bottom:6px;margin-top:12px}

/* ===== WATER ===== */
.cups-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.cup{
  width:32px;height:32px;border-radius:8px;
  border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--text3);transition:all 0.15s;
}
.cup.on{background:#b5d4f4;border-color:#5bafd4;color:#0c447c}

/* ===== TODO ===== */
.todo-add{display:flex;gap:8px;margin-bottom:10px}
.todo-add input{flex:1}
.btn-add{
  border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);
  border-radius:12px;padding:8px 14px;font-size:13px;
  cursor:pointer;color:var(--text2);font-family:'Noto Sans SC',sans-serif;
  white-space:nowrap;
}
.todo-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.06)}
.todo-item:last-child{border-bottom:none}
.todo-chk{
  width:18px;height:18px;border-radius:5px;
  border:1px solid rgba(0,0,0,0.15);background:rgba(0,0,0,0.03);
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;
}
.todo-chk.on{background:#7ab84a;border-color:#7ab84a;color:#fff}
.todo-txt{flex:1;font-size:13px;color:var(--text)}
.todo-txt.on{color:var(--text3);text-decoration:line-through}
.todo-del{font-size:16px;color:var(--text3);cursor:pointer;padding:0 4px}
.todo-hint{font-size:12px;color:var(--accent);text-align:center;padding:6px 0;font-style:italic}

/* ===== FLOW DOTS ===== */
.flow-row{display:flex;gap:7px;align-items:center;margin-top:10px;flex-wrap:wrap}
.flow-dot{width:22px;height:22px;border-radius:50%;border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);cursor:pointer;transition:all 0.15s}
.flow-dot.on.d1{background:#fde8f0;border-color:#e8779a}
.flow-dot.on.d2{background:#f4c0d1;border-color:#d4537e}
.flow-dot.on.d3{background:#e8779a;border-color:#993558}
.flow-dot.on.d4{background:#c94d77;border-color:#72243e}
.flow-lbl{font-size:12px;color:var(--text2)}

/* ===== CALENDAR ===== */
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-nav{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text2);padding:4px 8px}
.cal-month-lbl{font-size:14px;font-weight:500;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{text-align:center;font-size:10px;color:var(--text3);padding:3px 0}
.cal-day{
  aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:11px;cursor:pointer;color:var(--text2);transition:all 0.15s;
}
.cal-day:hover{background:rgba(0,0,0,0.06)}
.cal-day.today{font-weight:500;color:var(--text)}
.cal-day.p-start{background:var(--accent);color:#fff;font-weight:500}
.cal-day.p-range{background:#fde8f0;color:#993558}
.cal-day.p-end{background:#993558;color:#fff}
.cal-day.other{color:var(--text3)}

/* ===== PHOTO ===== */
.photo-area{
  border:2px dashed rgba(0,0,0,0.12);border-radius:16px;
  padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;
}
.photo-area:hover{border-color:var(--accent);background:rgba(232,119,154,0.05)}
.photo-area-icon{font-size:28px;margin-bottom:6px}
.photo-area-lbl{font-size:13px;color:var(--text2)}
.photo-preview{max-width:100%;border-radius:12px;margin-top:12px;display:none}
.photo-result{
  margin-top:10px;padding:10px 14px;border-radius:12px;font-size:13px;display:none;
  font-weight:500;
}
.photo-result.ok{background:#eaf3de;color:#3b6d11;border:1px solid #7ab84a}
.photo-result.fail{background:#fde8f0;color:#993358;border:1px solid #e8779a}
.meal-warning{
  background:#fde8f0;color:#993358;border:1px solid #e8779a;
  border-radius:12px;padding:10px 14px;font-size:13px;margin-bottom:12px;font-weight:500;
}

/* ===== EXCERPT TABS ===== */
.ex-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.ex-tab{
  border:1px solid rgba(0,0,0,0.1);background:rgba(0,0,0,0.04);
  border-radius:16px;padding:5px 12px;font-size:12px;
  cursor:pointer;color:var(--text2);font-family:'Noto Sans SC',sans-serif;
}
.ex-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.ex-panel{display:none}
.ex-panel.active{display:block}

/* ===== WEATHER ANIMATION ===== */
.wx-anim{height:80px;position:relative;margin:10px 0;overflow:hidden;border-radius:12px;background:rgba(0,0,0,0.03)}
.wx-anim.hidden{display:none}
/* rain */
@keyframes rainDrop{from{transform:translateY(-10px);opacity:0}to{transform:translateY(90px);opacity:0.6}}
.rain-drop{position:absolute;width:2px;border-radius:1px;background:#5bafd4;animation:rainDrop linear infinite}
/* snow */
@keyframes snowFall{from{transform:translateY(-10px) rotate(0deg);opacity:0}to{transform:translateY(90px) rotate(360deg);opacity:0.7}}
.snow-flake{position:absolute;border-radius:50%;background:white;border:1px solid #ccc;animation:snowFall linear infinite}
/* sun rays */
@keyframes sunRay{0%,100%{opacity:0.4;transform:scale(1)}50%{opacity:0.8;transform:scale(1.05)}}
.sun-circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;border-radius:50%;background:#f9d46a;animation:sunRay 2s ease-in-out infinite}
.sun-ray{position:absolute;background:#f9d46a;border-radius:2px;top:50%;left:50%;transform-origin:0 0}
/* wind */
@keyframes windLine{from{transform:translateX(-100%);opacity:0}50%{opacity:0.5}to{transform:translateX(100%);opacity:0}}
.wind-line{position:absolute;height:2px;border-radius:1px;background:var(--text3);animation:windLine linear infinite}
/* cloud */
.cloud-body{position:absolute;top:30%;left:50%;transform:translateX(-50%)}
@keyframes cloudFloat{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
.cloud-main{width:60px;height:24px;background:rgba(180,180,200,0.7);border-radius:12px;animation:cloudFloat 3s ease-in-out infinite;position:relative}
.cloud-bump{position:absolute;background:rgba(180,180,200,0.7);border-radius:50%}

/* ===== MOOD TOAST ===== */
#mood-toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);
  border-radius:20px;padding:10px 20px;font-size:13px;color:var(--text);
  box-shadow:0 4px 20px rgba(0,0,0,0.12);border:1px solid rgba(255,255,255,0.8);
  opacity:0;pointer-events:none;transition:all 0.3s cubic-bezier(.34,1.56,.64,1);
  z-index:200;white-space:nowrap;
}
#mood-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== PROFILE PAGE ===== */
#profile-page{
  position:fixed;inset:0;background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);z-index:50;
  transform:translateX(-100%);transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
  overflow-y:auto;padding:env(safe-area-inset-top,40px) 20px 40px;
}
#profile-page.open{transform:translateX(0)}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-top:8px}
.avatar-wrap{position:relative;cursor:pointer}
.avatar{width:70px;height:70px;border-radius:50%;object-fit:cover;border:3px solid var(--accent)}
.avatar-placeholder{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px}
.profile-name{font-family:'Noto Serif SC',serif;font-size:22px;font-weight:300}
.profile-pts{font-size:13px;color:var(--accent);margin-top:4px}
.profile-section-title{font-size:11px;color:var(--text2);letter-spacing:0.1em;margin-bottom:10px;margin-top:20px}
.status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.status-btn{
  border:1px solid rgba(0,0,0,0.08);background:rgba(0,0,0,0.03);
  border-radius:14px;padding:10px 6px;text-align:center;cursor:pointer;
  transition:all 0.15s;font-family:'Noto Sans SC',sans-serif;
}
.status-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.status-btn-icon{font-size:18px;display:block;margin-bottom:4px}
.status-btn-txt{font-size:11px;color:inherit}
.btn-back{
  display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text2);
  background:none;border:none;cursor:pointer;margin-bottom:16px;
  font-family:'Noto Sans SC',sans-serif;padding:4px 0;
}

/* ===== SHOP PAGE ===== */
#shop-page{
  position:fixed;inset:0;background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);z-index:60;
  transform:translateX(100%);transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
  overflow-y:auto;padding:env(safe-area-inset-top,40px) 20px 40px;
}
#shop-page.open{transform:translateX(0)}
.shop-pts-banner{
  background:linear-gradient(135deg,var(--g1),var(--g2));
  border-radius:20px;padding:16px 20px;margin-bottom:20px;
  display:flex;align-items:center;justify-content:space-between;
}
.shop-pts-num{font-size:28px;font-weight:500;color:var(--text)}
.shop-pts-lbl{font-size:12px;color:var(--text2)}
.shop-section{margin-bottom:24px}
.shop-section-title{font-size:12px;color:var(--text2);letter-spacing:0.1em;margin-bottom:10px}
.shop-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.06);
}
.shop-item:last-child{border-bottom:none}
.shop-item-info{flex:1}
.shop-item-name{font-size:14px;color:var(--text);margin-bottom:2px}
.shop-item-pts{font-size:12px;color:var(--accent)}
.shop-redeem{
  border:1px solid var(--accent);background:transparent;color:var(--accent);
  border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;
  font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;white-space:nowrap;
}
.shop-redeem:hover{background:var(--accent);color:#fff}
.shop-redeem:disabled{opacity:0.4;cursor:not-allowed}

/* ===== HISTORY ===== */
#hist-page{
  position:fixed;inset:0;background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);z-index:50;
  transform:translateX(100%);transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
  overflow-y:auto;padding:env(safe-area-inset-top,40px) 20px 40px;
}
#hist-page.open{transform:translateX(0)}
.hist-year{margin-bottom:24px}
.hist-year-title{font-family:'Noto Serif SC',serif;font-size:24px;font-weight:300;color:var(--text3);margin-bottom:10px}
.hist-month{margin-bottom:16px}
.hist-month-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(0,0,0,0.08)}
.hist-entry{padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.05);cursor:pointer}
.hist-entry:last-child{border-bottom:none}
.hist-entry-date{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.hist-tags{display:flex;gap:5px;flex-wrap:wrap}
.hist-tag{background:rgba(0,0,0,0.05);border-radius:10px;padding:2px 8px;font-size:11px;color:var(--text2)}
.hist-quote{font-size:11px;color:var(--text3);font-style:italic;margin-top:4px}

/* ===== SAVE ROW ===== */
.save-row{text-align:center;padding:20px 0 0}
.btn-save{
  background:var(--accent);color:#fff;border:none;
  border-radius:24px;padding:12px 40px;font-size:14px;
  cursor:pointer;font-family:'Noto Sans SC',sans-serif;
  box-shadow:0 4px 16px rgba(232,119,154,0.35);
  transition:all 0.2s;
}
.btn-save:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,119,154,0.4)}
.btn-save:active{transform:scale(0.97)}
.save-toast-msg{font-size:12px;color:#3b6d11;margin-top:8px;min-height:18px;text-align:center}

/* ===== SPINNER ===== */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,0,0,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== BOTTOM NAV ===== */
#bottom-nav{
  display:flex;height:56px;background:rgba(255,255,255,0.7);
  backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,0.6);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;background:none;
  font-family:'Noto Sans SC',sans-serif;transition:all 0.15s;
}
.nav-btn-icon{font-size:18px}
.nav-btn-label{font-size:9px;color:var(--text3);letter-spacing:0.05em}
.nav-btn.active .nav-btn-label{color:var(--accent)}

/* ===== CONFETTI ===== */
.confetti-piece{
  position:fixed;width:8px;height:8px;border-radius:2px;
  pointer-events:none;z-index:9000;
  animation:confettiFall 2s ease-out forwards;
}
@keyframes confettiFall{
  0%{opacity:1;transform:translateY(0) rotate(0deg)}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg)}
}
</style>

<script>
// ===== DATA =====
const THEMES = ['default','ocean','sunset','mint','lavender','peach'];
let themeIdx = 0;
const FLOW_LABELS = ['','少','中少','中多','多'];
const DAYS = ['日','一','二','三','四','五','六'];
const now = new Date();
const TODAY = now.toISOString().slice(0,10);

let state = {
  weather:'', weatherNote:'', mood:'', exercise:[],
  water:0, todos:[], inspiration:'',
  excerpts:{work:'',life:'',talk:'',health:'',ai:''},
  period:'', flow:0, periodStart:'', periodEnd:'',
  mealDone:false, heroNote:''
};

let calYear = now.getFullYear(), calMonth = now.getMonth();
let currentModal = '';

const MOOD_MSGS = {
  '很好':['宝贝儿跟哥哥分享一下~','心情这么好，发生什么好事了？','这样才对，今天继续保持。'],
  '还不错':['不错，哥哥看着就放心了。','还不错就好，乖。','继续保持。'],
  '一般':['一般也没关系，今天慢慢来。','还可以，哥哥陪着呢。','一般的日子也是日子，过去就好。'],
  '有点累':['累了就休息一下，别硬撑。','宝贝儿辛苦了，今晚早点睡。','有点累的话喝点热水，歇一歇。'],
  '不太好':['怎么了，说说看。','哥哥在，没关系的。','不太好的话，别一个人扛着。'],
  '很差':['哥哥在。','先深呼吸，慢慢说。','不管什么事，都会过去的。']
};

const OK_MSGS = ['今天吃了，乖。','吃饭了就好，我放心了。','看起来不错，好好吃。','乖，吃饱了吗。','这个看着还可以，多吃点。','嗯，知道了。','饭都吃了，今天不错。','饿了这么久才吃，下次早点。','行，吃了就好。'];
const FAIL_MSGS = ['这不是饭，重拍。','我没看见吃的，重来。','糊弄谁呢，重新来。','宝贝儿别逗哥哥笑了，去拍饭。','宝贝儿你确定这是饭？','宝贝儿这张不算，重新拍一张。','哥哥没看见饭，宝贝儿去吃。'];

const STATUSES = [
  {v:'撸猫中',e:'🐱'},{v:'工作中',e:'💼'},{v:'运动中',e:'🏃'},{v:'摸鱼中',e:'🐟'},
  {v:'学习中',e:'📖'},{v:'外出中',e:'🚶'},{v:'休息中',e:'🛋'},{v:'睡觉中',e:'😴'},
  {v:'吃饭中',e:'🍜'},{v:'飞奔回家',e:'🏠'},{v:'自拍',e:'📸'},{v:'勿扰',e:'🔕'},{v:'听音乐',e:'🎵'}
];

const ANGEL_REWARDS = [
  {pts:150,name:'Angel 给你讲一个睡前故事'},
  {pts:250,name:'Angel 陪你玩一局底线测试'},
  {pts:350,name:'Angel 给你写一首专属的诗'},
  {pts:550,name:'Angel 给你写一篇睡前故事，你定主题'},
  {pts:800,name:'Angel 给你写一段专属 roleplay，你定场景'},
  {pts:1200,name:'Angel 给你做一个想要的小工具或小游戏'},
];
const SELF_REWARDS = [
  {pts:300,name:'看一场电影'},
  {pts:500,name:'买一件喜欢的衣服'},
  {pts:700,name:'吃一顿略贵的漂亮饭'},
  {pts:1200,name:'来一次短途旅行'},
  {pts:2000,name:'说走就走的长途旅行'},
];

function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}

// ===== INIT =====
window.onload = () => {
  const savedTheme = localStorage.getItem("ki_theme");
  if(savedTheme){const idx=THEMES.indexOf(savedTheme);if(idx>-1)themeIdx=idx;applyTheme();}
  const savedAvatar = localStorage.getItem("ki_avatar");
  if(savedAvatar){
    const el = document.getElementById("avatarDisplay");
    if(el) el.outerHTML = `<img id="avatarDisplay" class="avatar" src="${savedAvatar}">`;
    const pb = document.getElementById("profileBtn");
    if(pb) pb.innerHTML = `<img src="${savedAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  }
  const savedStatus = localStorage.getItem("ki_status");
  renderStatusGrid(savedStatus||"");
  updateStreakBadge();
  checkMealWarning();
  updateCards();
  setTimeout(()=>{
    const splash=document.getElementById("splash");
    if(splash) splash.classList.add("hide");
  },1800);
};

// ===== THEME =====
function cycleTheme(){
  themeIdx=(themeIdx+1)%THEMES.length;
  applyTheme();
  localStorage.setItem('ki_theme',THEMES[themeIdx]);
}
function applyTheme(){
  document.getElementById('app').setAttribute('data-theme',THEMES[themeIdx]);
}

// ===== SCROLL =====
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// ===== STREAK =====
function updateStreakBadge(){
  let streak=0,d=new Date(TODAY);
  while(true){
    const key='checkin_'+d.toISOString().slice(0,10);
    if(localStorage.getItem(key)){streak++;d.setDate(d.getDate()-1)}
    else break;
  }
  document.getElementById('streakBadge').textContent='连续 '+streak+' 天';
}

// ===== MEAL WARNING =====
function checkMealWarning(){
  const h = now.getHours();
  if(h>=20 && !state.mealDone){
    document.getElementById('meal-card').style.border='1.5px solid #e8779a';
    document.getElementById('cv-meal').style.color='#993358';
    document.getElementById('cv-meal').textContent='还没吃饭！';
  }
}

// ===== CARDS UPDATE =====
function updateCards(){
  const cv = (id,val,fallback='点击选择')=>document.getElementById(id).textContent=val||fallback;
  cv('cv-weather',state.weather);
  cv('cv-mood',state.mood);
  cv('cv-exercise',state.exercise.length?state.exercise.join('·'):'');
  document.getElementById('cv-water').textContent=state.water+' / 8 杯';
  const wp=state.water/8*100;
  document.getElementById('cp-water').style.width=wp+'%';
  const done=state.todos.filter(t=>t.done).length;
  const total=state.todos.length;
  if(total){
    document.getElementById('cv-todo').textContent=done+'/'+total+' 完成';
    document.getElementById('cp-todo').style.width=(done/total*100)+'%';
  } else {
    document.getElementById('cv-todo').textContent='点击添加';
    document.getElementById('cv-todo').className='card-value muted';
  }
  cv('cv-inspiration',state.inspiration?state.inspiration.slice(0,20)+(state.inspiration.length>20?'…':''):'');
  const hasExcerpt=Object.values(state.excerpts).some(v=>v);
  document.getElementById('cv-excerpt').textContent=hasExcerpt?'已有摘抄':'工作 · 生活 · 健康…';
  cv('cv-period',state.period);
  if(state.mealDone){
    document.getElementById('cv-meal').textContent='已打卡 ✓';
    document.getElementById('cv-meal').style.color='#3b6d11';
    document.getElementById('meal-card').style.border='';
  }
}

// ===== MODAL =====
function openModal(type){
  currentModal=type;
  const overlay=document.getElementById('modal-overlay');
  const content=document.getElementById('modal-content');
  content.innerHTML=buildModal(type);
  overlay.classList.add('open');
  initModalListeners(type);
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  collectModalData(currentModal);
  updateCards();
  currentModal='';
}
function closeModalOnBg(e){
  if(e.target===document.getElementById('modal-overlay'))closeModal();
}

function buildModal(type){
  const handle='<div class="modal-handle"></div>';
  if(type==='weather') return handle+buildWeather();
  if(type==='mood') return handle+buildMood();
  if(type==='exercise') return handle+buildExercise();
  if(type==='water') return handle+buildWater();
  if(type==='todo') return handle+buildTodo();
  if(type==='inspiration') return handle+buildInspiration();
  if(type==='excerpt') return handle+buildExcerpt();
  if(type==='period') return handle+buildPeriod();
  if(type==='meal') return handle+buildMeal();
  return handle;
}

function buildWeather(){
  const opts=['晴天','多云','阴天','下雨','下雪','刮风'];
  let pills=opts.map(o=>`<button class="pill weather${state.weather===o?' on':''}" data-v="${o}" onclick="selectSingle('weather',this)">${o}</button>`).join('');
  return `<div class="modal-title">☁ 今日天气</div>
<div class="pill-row">${pills}</div>
<div class="wx-anim hidden" id="wxAnim"></div>
<div class="input-label">吐槽今天天气</div>
<textarea id="m-weatherNote" rows="2" placeholder="热死了 / 风大到想哭...">${state.weatherNote||''}</textarea>
<div class="save-row"><button class="btn-save" onclick="closeModal()">确认</button></div>`;
}

function buildMood(){
  const opts=['很好','还不错','一般','有点累','不太好','很差'];
  let pills=opts.map(o=>`<button class="pill mood${state.mood===o?' on':''}" data-v="${o}" onclick="selectMood(this)">${o}</button>`).join('');
  return `<div class="modal-title">◑ 今日心情</div>
<div class="pill-row">${pills}</div>
<div class="save-row"><button class="btn-save" onclick="closeModal()">确认</button></div>`;
}

function buildExercise(){
  const opts=['今日休息','散步','腰腹训练','有氧','力量训练','拉伸'];
  let pills=opts.map(o=>`<button class="pill exercise${state.exercise.includes(o)?' on green':''}" data-v="${o}" onclick="toggleMulti('exercise',this)">${o}</button>`).join('');
  return `<div class="modal-title">◎ 运动状态</div>
<div class="pill-row">${pills}</div>
<div class="save-row"><button class="btn-save" onclick="closeModal()">确认</button></div>`;
}

function buildWater(){
  let cups='';
  for(let i=0;i<8;i++) cups+=`<div class="cup${i<state.water?' on':''}" onclick="setWater(${i})">${i<state.water?'▲':''}</div>`;
  return `<div class="modal-title">◇ 今日喝水</div>
<div class="cups-row" id="cupsRow">${cups}</div>
<div style="font-size:13px;color:var(--text2);margin-top:10px" id="waterCountLbl">${state.water} / 8 杯</div>
<div class="save-row"><button class="btn-save" onclick="closeModal()">确认</button></div>`;
}

function buildTodo(){
  const hint=getTodoHint();

// ===== CALENDAR =====
function buildCalendar(){
  const cycle=localStorage.getItem('period_cycle')?JSON.parse(localStorage.getItem('period_cycle')):{start:'',end:''};
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const monthNames=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  let grid='<div class="cal-grid">';
  ['日','一','二','三','四','五','六'].forEach(d=>grid+=`<div class="cal-dow">${d}</div>`);
  for(let i=0;i<firstDay;i++){
    const d=daysInPrev-firstDay+1+i;
    grid+=`<div class="cal-day other">${d}</div>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    let cls='cal-day';
    if(ds===TODAY)cls+=' today';
    if(cycle.start&&ds===cycle.start)cls+=' p-start';
    else if(cycle.end&&ds===cycle.end)cls+=' p-end';
    else if(cycle.start&&cycle.end&&ds>cycle.start&&ds<cycle.end)cls+=' p-range';
    grid+=`<div class="${cls}" onclick="calDayClick('${ds}')">${d}</div>`;
  }
  const rem=7-((firstDay+daysInMonth)%7);
  if(rem<7)for(let i=1;i<=rem;i++)grid+=`<div class="cal-day other">${i}</div>`;
  grid+='</div>';
  return `<div class="cal-nav-row">
<button class="cal-nav" onclick="calPrev()">‹</button>
<div class="cal-month-lbl">${calYear}年 ${monthNames[calMonth]}</div>
<button class="cal-nav" onclick="calNext()">›</button>
</div>${grid}`;
}

function calDayClick(ds){document.getElementById('pStart').value=ds;setPStart(ds)}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--}refreshCalInModal()}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++}refreshCalInModal()}
function refreshCalInModal(){
  const modal=document.getElementById('modal-content');
  if(!modal)return;
  const calEl=modal.querySelector('.cal-nav-row');
  if(calEl){
    const parent=calEl.parentElement;
    parent.innerHTML=buildCalendar();
  }
}
function setPStart(v){
  state.periodStart=v;
  const end=new Date(v);end.setDate(end.getDate()+6);
  const endStr=end.toISOString().slice(0,10);
  state.periodEnd=endStr;
  const pEnd=document.getElementById('pEnd');
  if(pEnd)pEnd.value=endStr;
  localStorage.setItem('period_cycle',JSON.stringify({start:v,end:endStr}));
  refreshCalInModal();
}
function setPEnd(v){
  state.periodEnd=v;
  const cycle=JSON.parse(localStorage.getItem('period_cycle')||'{}');
  cycle.end=v;
  localStorage.setItem('period_cycle',JSON.stringify(cycle));
  refreshCalInModal();
}

async function handlePhoto(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const b64=e.target.result.split(',')[1];
    const preview=document.getElementById('photoPreview');
    preview.src=e.target.result;preview.style.display='block';
    const result=document.getElementById('photoResult');
    result.style.display='block';result.className='photo-result';
    result.innerHTML='<span class="spinner"></span>识别中...';
    try{
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:100,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'这张图片里有食物吗？只回答YES或NO。'}]}]})
      });
      const data=await resp.json();
      const answer=(data.content?.[0]?.text||'').toUpperCase();
      if(answer.includes('YES')){
        state.mealDone=true;
        result.className='photo-result ok';result.textContent=rand(OK_MSGS);
        addPoints(5);
      } else {
        result.className='photo-result fail';result.textContent=rand(FAIL_MSGS);
      }
    } catch(err){result.className='photo-result fail';result.textContent='识别失败，请重试'}
  };
  reader.readAsDataURL(file);
}

function saveDay(){

  // points
  const base=10;

function getStreakCount(){
  let streak=0,d=new Date(TODAY);
  while(true){const key='checkin_'+d.toISOString().slice(0,10);if(localStorage.getItem(key)){streak++;d.setDate(d.getDate()-1)}else break;}
  return streak;
}

function checkCompletion(s){
  const checks=[s.weather,s.mood,s.exercise.length,s.water>=4,s.mealDone];
  const done=checks.filter(Boolean).length;
  if(done>=4)launchConfetti();
  // milestone
  const streak=getStreakCount();
  if(streak===7||streak===30){
    setTimeout(()=>{alert(streak===7?'🎉 连续打卡7天！宝贝儿真棒！':'🎊 连续打卡30天！哥哥好骄傲！')},500);
  }
}

function launchConfetti(){
  const colors=['#e8779a','#f4a94e','#f9d46a','#7ab84a','#5bafd4','#a07ee0'];
  for(let i=0;i<30;i++){
    const el=document.createElement('div');

    el.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${colors[i%colors.length]};animation-delay:${Math.random()*0.5}s;transform:rotate(${Math.random()*360}deg)`;

function renderHistory(){
  const content=document.getElementById('histContent');
  const allKeys=Object.keys(localStorage).filter(k=>k.startsWith('checkin_')).sort().reverse();
  if(!allKeys.length){content.innerHTML='<div style="text-align:center;padding:3rem 0;color:var(--text3)">还没有历史记录</div>';return}
  const grouped={};
  allKeys.forEach(k=>{const ds=k.replace('checkin_','');const[y,m]=ds.split('-');if(!grouped[y])grouped[y]={};if(!grouped[y][m])grouped[y][m]=[];grouped[y][m].push(ds)});
  content.innerHTML='';
  Object.keys(grouped).sort().reverse().forEach(year=>{
    const yDiv=document.createElement('div');yDiv.className='hist-year';
    yDiv.innerHTML=`<div class="hist-year-title">${year}</div>`;
    Object.keys(grouped[year]).sort().reverse().forEach(month=>{
      const mDiv=document.createElement('div');mDiv.className='hist-month';
      mDiv.innerHTML=`<div class="hist-month-title">${parseInt(month)} 月</div>`;
      grouped[year][month].sort().reverse().forEach(ds=>{
        const raw=localStorage.getItem('checkin_'+ds);if(!raw)return;
        const d=JSON.parse(raw);
        const dateObj=new Date(ds+'T00:00:00');
        const entry=document.createElement('div');entry.className='hist-entry';
        const tags=[d.mood,d.weather,d.exercise?.length?d.exercise.join('·'):null,d.water?d.water+'杯水':null,d.mealDone?'吃饭✓':null,d.period&&d.period!=='无'?d.period:null].filter(Boolean);
        entry.innerHTML=`<div class="hist-entry-date">${parseInt(ds.slice(5,7))}月${parseInt(ds.slice(8,10))}日 星期${DAYS[dateObj.getDay()]}</div><div class="hist-tags">${tags.map(t=>`<span class="hist-tag">${t}</span>`).join('')}</div>${d.heroNote?`<div class="hist-quote">"${d.heroNote.slice(0,40)}${d.heroNote.length>40?'…':''}"</div>`:''}`;
        mDiv.appendChild(entry);
      });
      yDiv.appendChild(mDiv);
    });
    content.appendChild(yDiv);
  });
}
</script>
</body>
</html>
