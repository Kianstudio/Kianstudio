<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="26" fill="white"/>
  <!-- cat outline -->
  <path d="M22 88 Q22 52 60 52 Q98 52 98 88 Q98 108 60 110 Q22 108 22 88Z" fill="none" stroke="#aaa" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ears -->
  <path d="M32 57 Q29 36 44 40 Q41 52 32 57Z" fill="none" stroke="#aaa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M88 57 Q91 36 76 40 Q79 52 88 57Z" fill="none" stroke="#aaa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- eyes -->
  <circle cx="47" cy="74" r="3" fill="#aaa"/>
  <circle cx="73" cy="74" r="3" fill="#aaa"/>
  <!-- nose -->
  <ellipse cx="60" cy="85" rx="3.5" ry="2.5" fill="#ccc"/>
  <!-- whiskers left -->
  <line x1="22" y1="80" x2="50" y2="83" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="87" x2="50" y2="87" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
  <!-- whiskers right -->
  <line x1="98" y1="80" x2="70" y2="83" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="98" y1="87" x2="70" y2="87" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
  <!-- firework centered on cat -->
  <g transform="translate(60,86)">
    <!-- main spokes -->
    <line x1="0" y1="-8" x2="0" y2="-22" stroke="#e8779a" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-24" r="3.5" fill="#e8779a"/>
    <line x1="6" y1="-5" x2="16" y2="-14" stroke="#f4a94e" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="-16" r="3.5" fill="#f4a94e"/>
    <line x1="8" y1="1" x2="22" y2="1" stroke="#f9d46a" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="24" cy="1" r="3.5" fill="#f9d46a"/>
    <line x1="6" y1="7" x2="16" y2="17" stroke="#7ab84a" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="18" cy="19" r="3.5" fill="#7ab84a"/>
    <line x1="0" y1="8" x2="0" y2="22" stroke="#5bafd4" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="24" r="3.5" fill="#5bafd4"/>
    <line x1="-6" y1="7" x2="-16" y2="17" stroke="#a07ee0" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-18" cy="19" r="3.5" fill="#a07ee0"/>
    <line x1="-8" y1="1" x2="-22" y2="1" stroke="#e87b9a" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-24" cy="1" r="3.5" fill="#e87b9a"/>
    <line x1="-6" y1="-5" x2="-16" y2="-14" stroke="#f97b6b" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="-18" cy="-16" r="3.5" fill="#f97b6b"/>
    <!-- secondary small spokes -->
    <line x1="4" y1="-7" x2="10" y2="-18" stroke="#fbc97a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="11" cy="-20" r="2" fill="#fbc97a"/>
    <line x1="7" y1="4" x2="18" y2="10" stroke="#7dd4a0" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="20" cy="11" r="2" fill="#7dd4a0"/>
    <line x1="-4" y1="7" x2="-10" y2="18" stroke="#7ab8e8" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-11" cy="20" r="2" fill="#7ab8e8"/>
    <line x1="-7" y1="-4" x2="-18" y2="-10" stroke="#d4e87a" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-20" cy="-11" r="2" fill="#d4e87a"/>
  </g>
</svg>
